<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Perbandingan Reaktan</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
        }

        #game-container {
            position: relative;
            width: 512px;
            height: 288px;
            background-color: #000;
            overflow: hidden;
            transform-origin: center;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            pointer-events: none;
        }

        .text-box {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            height: 32px;
            pointer-events: none;
            white-space: nowrap; /* Mencegah teks turun ke baris baru jika panjang */
        }

        .text-box sub {
            font-size: 10px; 
            vertical-align: sub; 
            margin-left: 1px; 
        }

        #text-h {
            left: 64px;  
            top: 192px;  
            width: 96px; 
        }

        #text-o {
            left: 192px; 
            top: 192px;  
            width: 96px; 
        }

        #text-h2o {
            left: 320px; 
            top: 192px;  
            width: 128px; 
            transition: font-size 0.2s ease; /* Transisi halus saat ukuran font mengecil */
        }

        .btn {
            position: absolute;
            width: 32px;
            height: 32px;
            top: 224px; 
            cursor: pointer;
        }

        #btn-h-min { left: 64px; }  
        #btn-h-plus { left: 128px; } 
        #btn-o-min { left: 192px; } 
        #btn-o-plus { left: 256px; } 

    </style>
</head>
<body>

    <div id="game-container">
        <img id="bg-canvas" class="layer" src="kanvaspb.png" alt="Canvas Dasar">
        <img id="anim-layer" class="layer" src="pbh1o1.gif" alt="Animasi Reaksi">

        <div id="text-h" class="text-box">H<sub>2(g)</sub></div>
        <div id="text-o" class="text-box">O<sub>2(g)</sub></div>
        <div id="text-h2o" class="text-box">H<sub>2</sub>O<sub>(l)</sub></div>

        <div id="btn-h-min" class="btn" onclick="updateReaktan('h', -1)"></div>
        <div id="btn-h-plus" class="btn" onclick="updateReaktan('h', 1)"></div>
        <div id="btn-o-min" class="btn" onclick="updateReaktan('o', -1)"></div>
        <div id="btn-o-plus" class="btn" onclick="updateReaktan('o', 1)"></div>
    </div>

    <script>
        let h = 1;
        let o = 1;

        const animLayer = document.getElementById('anim-layer');
        const textH = document.getElementById('text-h');
        const textO = document.getElementById('text-o');
        const textH2O = document.getElementById('text-h2o');

        function updateReaktan(tipe, nilai) {
            if (tipe === 'h') {
                h += nilai;
                if (h < 1) h = 1;
                if (h > 4) h = 4;
            } else if (tipe === 'o') {
                o += nilai;
                if (o < 1) o = 1;
                if (o > 4) o = 4;
            }
            renderDisplay();
        }

        function renderDisplay() {
            // 1. Update GIF Layer
            animLayer.src = `pbh${h}o${o}.gif`;

            // 2. Update Teks Reaktan
            let labelH = h === 1 ? '' : `${h} `;
            textH.innerHTML = `${labelH}H<sub>2(g)</sub>`;

            let labelO = o === 1 ? '' : `${o} `;
            textO.innerHTML = `${labelO}O<sub>2(g)</sub>`;

            // 3. Logika Stoikiometri & Pereaksi Pembatas
            let h2oTerbentuk = Math.min(h, o * 2); 
            let sisaH = h - h2oTerbentuk;
            let sisaO = o - (h2oTerbentuk / 2);

            let produkText = "";

            // Format Air (H2O)
            if (h2oTerbentuk > 0) {
                let labelH2O = (h2oTerbentuk === 1) ? '' : `${h2oTerbentuk} `;
                produkText += `${labelH2O}H<sub>2</sub>O<sub>(l)</sub>`;
            }

            // Format Sisa Hidrogen
            if (sisaH > 0) {
                if (produkText !== "") produkText += " + ";
                let labelSisaH = (sisaH === 1) ? '' : `${sisaH} `;
                produkText += `${labelSisaH}H<sub>2(g)</sub>`;
            }

            // Format Sisa Oksigen
            if (sisaO > 0) {
                if (produkText !== "") produkText += " + ";
                // Jika sisanya 0.5 molekul O2, tampilkan sebagai pecahan ½ agar estetis
                let labelSisaO = (sisaO === 1) ? '' : (sisaO === 0.5 ? '½ ' : `${sisaO} `);
                produkText += `${labelSisaO}O<sub>2(g)</sub>`;
            }

            // 4. Penyesuaian Dinamis UI
            // Jika teks panjang karena ada sisa, kecilkan font agar tidak melampaui lebar kanvas
            if (sisaH > 0 || sisaO > 0) {
                textH2O.style.fontSize = "11px"; 
            } else {
                textH2O.style.fontSize = "16px"; 
            }

            textH2O.innerHTML = produkText;
        }

        window.onload = () => {
            renderDisplay();
        };
    </script>

</body>
</html>
